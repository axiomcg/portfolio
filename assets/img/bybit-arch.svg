<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000" role="img">
  <title>Bybit trading bot — signal to order pipeline</title>
  <desc>Engineering schematic. A Telegram signals channel triggers an asyncio bot that matches the ticker by regex and trades USDT-perpetual futures on Bybit v5. The private WebSocket (order, execution, position; HMAC-SHA256) is the source of truth; REST via pybit places orders and a public WebSocket streams tickers. Each signal opens a market SHORT immediately paired with an atomic server-side stop-loss, leaving no unprotected window (SL 0.8 percent, leverage 12.5x). Execution and position updates are persisted to a PostgreSQL trade ledger via SQLAlchemy.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0.8" cy="0.8" r="0.8" fill="#f5e6d2" fill-opacity="0.045"/>
    </pattern>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f5a623"/>
    </marker>
    <marker id="ahh" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8d8475"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1000" fill="#0b0a09"/>
  <rect x="0" y="0" width="1500" height="1000" fill="url(#grid)"/>
  <rect x="48" y="48" width="1404" height="904" fill="none" stroke="#f5e6d2" stroke-opacity="0.10" stroke-width="1"/>
  <path d="M48 66 L48 48 L66 48" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M1452 66 L1452 48 L1434 48" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M48 934 L48 952 L66 952" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M1452 934 L1452 952 L1434 952" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,ui-monospace,monospace">

    <!-- kicker -->
    <text x="72" y="92" font-size="22" fill="#f5a623">// bybit-bot · signal → order pipeline</text>

    <!-- ===== grouping zones ===== -->
    <rect x="72" y="248" width="320" height="320" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="86" y="272" font-size="16" fill="#8d8475">// signal</text>

    <rect x="456" y="168" width="384" height="560" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="470" y="192" font-size="16" fill="#8d8475">// bybit v5</text>

    <rect x="908" y="248" width="512" height="384" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="922" y="272" font-size="16" fill="#8d8475">// execution</text>

    <rect x="456" y="792" width="384" height="144" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="470" y="816" font-size="16" fill="#8d8475">// ledger</text>

    <!-- ===== connectors (under nodes) ===== -->
    <!-- 01 Telegram -> Bot -->
    <polyline points="236,392 236,440" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <!-- 02 Bot -> REST -->
    <polyline points="380,492 480,492" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <!-- 03 REST -> Market SHORT -->
    <polyline points="816,492 876,492 876,356 936,356" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <!-- 04 SHORT -> stop-loss -->
    <polyline points="1168,416 1168,480" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <!-- telemetry: private WS -> ledger -->
    <polyline points="480,300 412,300 412,872 480,872" fill="none" stroke="#f5e6d2" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="3 5" marker-end="url(#ahh)"/>

    <!-- ===== nodes ===== -->
    <!-- Telegram (primary) -->
    <rect x="92" y="288" width="288" height="104" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="92" y="288" width="3" height="104" rx="1.5" fill="#f5a623"/>
    <text x="114" y="326" font-size="24"><tspan fill="#f5a623">❯</tspan><tspan fill="#ece7df">  Telegram</tspan></text>
    <text x="114" y="354" font-size="16" fill="#b3a99b">signals channel</text>

    <!-- Bot (primary) -->
    <rect x="92" y="440" width="288" height="104" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="92" y="440" width="3" height="104" rx="1.5" fill="#f5a623"/>
    <text x="114" y="478" font-size="24"><tspan fill="#ece7df">◎  Bot</tspan></text>
    <text x="114" y="506" font-size="16" fill="#b3a99b">regex match · uvloop</text>

    <!-- private WS (primary · source of truth) -->
    <rect x="480" y="216" width="336" height="120" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="480" y="216" width="3" height="120" rx="1.5" fill="#f5a623"/>
    <text x="502" y="254" font-size="24"><tspan fill="#f5a623">⬡</tspan><tspan fill="#ffc05a">  private WS</tspan></text>
    <text x="794" y="252" font-size="14" fill="#8d8475" text-anchor="end">HMAC-SHA256</text>
    <text x="502" y="288" font-size="16" fill="#b3a99b">order · exec · position</text>
    <text x="502" y="316" font-size="15" fill="#f5a623">▸ source of truth</text>

    <!-- REST (primary) -->
    <rect x="480" y="440" width="336" height="104" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="480" y="440" width="3" height="104" rx="1.5" fill="#f5a623"/>
    <text x="502" y="478" font-size="24"><tspan fill="#ece7df">⬡  REST · pybit</tspan></text>
    <text x="502" y="506" font-size="16" fill="#b3a99b">order placement</text>

    <!-- public WS (ancillary) -->
    <rect x="480" y="584" width="336" height="104" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="480" y="584" width="3" height="104" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
    <text x="502" y="622" font-size="24"><tspan fill="#b3a99b">⬡  public WS</tspan></text>
    <text x="502" y="650" font-size="16" fill="#8d8475">tickers · telemetry</text>

    <!-- Market SHORT order (primary · soft focal) -->
    <rect x="936" y="296" width="464" height="120" rx="4" fill="#f5a623" fill-opacity="0.12" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="936" y="296" width="3" height="120" rx="1.5" fill="#f5a623"/>
    <text x="958" y="338" font-size="24"><tspan fill="#ffc05a">▸  Market SHORT order</tspan></text>
    <text x="958" y="366" font-size="16" fill="#b3a99b">via REST · pybit</text>

    <!-- atomic stop-loss (FOCAL) -->
    <rect x="936" y="480" width="464" height="136" rx="4" fill="#f5a623" fill-opacity="0.12" stroke="#f5a623" stroke-width="1.75"/>
    <rect x="936" y="480" width="3" height="136" rx="1.5" fill="#f5a623"/>
    <text x="958" y="528" font-size="26"><tspan fill="#ffc05a">▸  atomic stop-loss</tspan></text>
    <text x="958" y="560" font-size="16" fill="#b3a99b">server-side · SL 0.8% · 12.5×</text>

    <!-- Trade ledger (ancillary · datastore) -->
    <rect x="480" y="824" width="336" height="96" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
    <rect x="480" y="824" width="3" height="96" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
    <text x="502" y="862" font-size="24"><tspan fill="#ece7df">◆  Trade ledger</tspan></text>
    <text x="502" y="890" font-size="16" fill="#b3a99b">PostgreSQL · SQLAlchemy 2.0</text>

    <!-- ===== edge label chips ===== -->
    <g>
      <rect x="184" y="403" width="104" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="236" y="421" text-anchor="middle" font-size="15"><tspan fill="#f5a623">01</tspan><tspan fill="#b3a99b"> +X.XX%</tspan></text>
    </g>
    <g>
      <rect x="384" y="479" width="92" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="430" y="497" text-anchor="middle" font-size="15"><tspan fill="#f5a623">02</tspan><tspan fill="#b3a99b"> place</tspan></text>
    </g>
    <g>
      <rect x="797" y="407" width="158" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="876" y="425" text-anchor="middle" font-size="15"><tspan fill="#f5a623">03</tspan><tspan fill="#b3a99b"> market short</tspan></text>
    </g>
    <g>
      <rect x="1042" y="435" width="252" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="1168" y="453" text-anchor="middle" font-size="15"><tspan fill="#f5a623">04</tspan><tspan fill="#f5a623"> no unprotected window</tspan></text>
    </g>
    <g>
      <rect x="337" y="743" width="150" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="412" y="761" text-anchor="middle" font-size="15" fill="#b3a99b">exec · position</text>
    </g>

    <!-- ===== title cartouche ===== -->
    <rect x="1064" y="792" width="388" height="152" rx="4" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.18" stroke-width="1.2"/>
    <text x="1084" y="820" font-size="14" letter-spacing="2.2" fill="#8d8475">GLEB PYATKOV</text>
    <text x="1084" y="848" font-size="18"><tspan fill="#f5a623">bybit-bot</tspan><tspan fill="#8d8475" font-size="16"> · fig.01</tspan></text>
    <line x1="1064" y1="864" x2="1452" y2="864" stroke="#f5e6d2" stroke-opacity="0.12" stroke-width="1"/>
    <!-- legend: data path -->
    <line x1="1084" y1="888" x2="1124" y2="888" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <text x="1136" y="893" font-size="14" fill="#b3a99b">data path</text>
    <!-- legend: telemetry -->
    <line x1="1084" y1="912" x2="1124" y2="912" stroke="#f5e6d2" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="3 5" marker-end="url(#ahh)"/>
    <text x="1136" y="917" font-size="14" fill="#b3a99b">telemetry</text>
    <!-- legend: node rules -->
    <rect x="1268" y="881" width="3" height="14" rx="1.5" fill="#f5a623"/>
    <text x="1280" y="893" font-size="14" fill="#b3a99b">active</text>
    <rect x="1268" y="905" width="3" height="14" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
    <text x="1280" y="917" font-size="14" fill="#b3a99b">ancillary</text>
    <text x="1084" y="936" font-size="13" fill="#8d8475">❯ source  ◎ bot  ⬡ exchange  ▸ process  ◆ store</text>

  </g>
</svg>
