<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000" role="img" aria-labelledby="t d">
  <title id="t">VikiShop order lifecycle — 11-state finite state machine</title>
  <desc id="d">Engineering schematic. The happy-path spine runs new, awaiting_id, id_received, confirming_id, queued, purchasing, delivered. Subordinate exception branches: confirming_id and purchasing transition to failed, which escalates to manual or resolves to refunded; delivered can be relisted as inventory. Transitions form a validated graph, idempotent on the unique platform order id. delivered is the single terminal success state.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0.8" cy="0.8" r="0.8" fill="#f5e6d2" fill-opacity="0.045"/>
    </pattern>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f5a623"/>
    </marker>
    <marker id="ahh" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8d8475"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1000" fill="#0b0a09"/>
  <rect x="0" y="0" width="1500" height="1000" fill="url(#grid)"/>
  <rect x="48" y="48" width="1404" height="904" fill="none" stroke="#f5e6d2" stroke-opacity="0.10" stroke-width="1"/>
  <path d="M48 66 L48 48 L66 48" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M1452 66 L1452 48 L1434 48" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M48 934 L48 952 L66 952" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M1452 934 L1452 952 L1434 952" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,ui-monospace,monospace">

    <!-- kicker -->
    <text x="72" y="92" fill="#f5a623" font-size="22">// vikishop · order lifecycle — 11-state FSM</text>

    <!-- ===== happy-path group frame (focal spine) ===== -->
    <rect x="64" y="256" width="1372" height="132" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="78" y="282" fill="#8d8475" font-size="16">// happy path</text>

    <!-- spine connectors (primary amber) -->
    <polyline points="254,332 274,332" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <polyline points="448,332 468,332" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <polyline points="642,332 662,332" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <polyline points="836,332 856,332" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <polyline points="1030,332 1050,332" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <polyline points="1224,332 1244,332" fill="none" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>

    <!-- spine nodes (primary amber rule) -->
    <g>
      <rect x="82" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="82" y="296" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="94" y="318" fill="#f5a623" font-size="12">01</text>
      <text x="168" y="346" text-anchor="middle" fill="#ece7df" font-size="18">new</text>
    </g>
    <g>
      <rect x="276" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="276" y="296" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="288" y="318" fill="#f5a623" font-size="12">02</text>
      <text x="362" y="346" text-anchor="middle" fill="#ece7df" font-size="18">awaiting_id</text>
    </g>
    <g>
      <rect x="470" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="470" y="296" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="482" y="318" fill="#f5a623" font-size="12">03</text>
      <text x="556" y="346" text-anchor="middle" fill="#ece7df" font-size="18">id_received</text>
    </g>
    <g>
      <rect x="664" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="664" y="296" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="676" y="318" fill="#f5a623" font-size="12">04</text>
      <text x="750" y="346" text-anchor="middle" fill="#ece7df" font-size="18">confirming_id</text>
    </g>
    <g>
      <rect x="858" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="858" y="296" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="870" y="318" fill="#f5a623" font-size="12">05</text>
      <text x="944" y="346" text-anchor="middle" fill="#ece7df" font-size="18">queued</text>
    </g>
    <g>
      <rect x="1052" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="1052" y="296" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="1064" y="318" fill="#f5a623" font-size="12">06</text>
      <text x="1138" y="346" text-anchor="middle" fill="#ece7df" font-size="18">purchasing</text>
    </g>
    <g>
      <rect x="1246" y="296" width="172" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="1246" y="296" width="3" height="72" rx="1.5" fill="#5fd17e"/>
      <text x="1258" y="318" fill="#5fd17e" font-size="12">07</text>
      <text x="1332" y="346" text-anchor="middle" fill="#5fd17e" font-size="18">delivered</text>
    </g>

    <!-- ===== exception handling group frame (subordinate) ===== -->
    <rect x="684" y="440" width="560" height="276" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="698" y="464" fill="#8d8475" font-size="16">// exception handling</text>

    <!-- ===== inventory loop group frame ===== -->
    <rect x="1230" y="440" width="206" height="128" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="1244" y="464" fill="#8d8475" font-size="16">// inventory</text>

    <!-- branch connectors (subordinate · hairline-grey) -->
    <polyline points="750,368 750,430 894,430 894,470" fill="none" stroke="#8d8475" stroke-width="1.4" marker-end="url(#ahh)"/>
    <polyline points="1138,368 1138,430 994,430 994,470" fill="none" stroke="#8d8475" stroke-width="1.4" marker-end="url(#ahh)"/>
    <polyline points="944,536 944,584 804,584 804,618" fill="none" stroke="#8d8475" stroke-width="1.4" marker-end="url(#ahh)"/>
    <polyline points="944,536 944,584 1124,584 1124,618" fill="none" stroke="#8d8475" stroke-width="1.4" marker-end="url(#ahh)"/>
    <polyline points="1332,368 1332,470" fill="none" stroke="#8d8475" stroke-width="1.4" marker-end="url(#ahh)"/>

    <!-- branch edge chips -->
    <g>
      <rect x="876" y="417" width="136" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="944" y="435" text-anchor="middle" fill="#b3a99b" font-size="15">on error</text>
    </g>
    <g>
      <rect x="758" y="571" width="92" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="804" y="589" text-anchor="middle" fill="#b3a99b" font-size="15">escalate</text>
    </g>
    <g>
      <rect x="1082" y="571" width="84" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="1124" y="589" text-anchor="middle" fill="#b3a99b" font-size="15">refund</text>
    </g>
    <g>
      <rect x="1292" y="406" width="80" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="1332" y="424" text-anchor="middle" fill="#b3a99b" font-size="15">re-list</text>
    </g>

    <!-- branch nodes (ancillary hairline rule) -->
    <g>
      <rect x="844" y="470" width="200" height="66" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="844" y="470" width="3" height="66" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
      <text x="856" y="490" fill="#8d8475" font-size="12">08</text>
      <text x="944" y="514" text-anchor="middle" fill="#b3a99b" font-size="20">failed</text>
    </g>
    <g>
      <rect x="1246" y="470" width="172" height="66" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="1246" y="470" width="3" height="66" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
      <text x="1258" y="490" fill="#8d8475" font-size="12">10</text>
      <text x="1332" y="514" text-anchor="middle" fill="#b3a99b" font-size="20">relisted</text>
    </g>
    <g>
      <rect x="704" y="618" width="200" height="66" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="704" y="618" width="3" height="66" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
      <text x="716" y="638" fill="#8d8475" font-size="12">09</text>
      <text x="804" y="662" text-anchor="middle" fill="#b3a99b" font-size="20">manual</text>
    </g>
    <g>
      <rect x="1024" y="618" width="200" height="66" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="1024" y="618" width="3" height="66" rx="1.5" fill="#f5e6d2" fill-opacity="0.20"/>
      <text x="1036" y="638" fill="#8d8475" font-size="12">11</text>
      <text x="1124" y="662" text-anchor="middle" fill="#b3a99b" font-size="20">refunded</text>
    </g>

    <!-- ===== bottom-left annotations ===== -->
    <text x="80" y="884" fill="#8d8475" font-size="15">// validated transition graph · retry / escalation</text>
    <text x="80" y="910" fill="#8d8475" font-size="15">// idempotent on unique platform order id</text>

    <!-- ===== title block / cartouche ===== -->
    <rect x="1064" y="760" width="388" height="172" rx="6" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.18" stroke-width="1.2"/>
    <text x="1086" y="790" fill="#8d8475" font-size="14" letter-spacing="0.18em">GLEB PYATKOV</text>
    <text x="1086" y="816" font-size="18"><tspan fill="#f5a623">vikishop</tspan><tspan fill="#8d8475" font-size="16"> · fig.02</tspan></text>
    <line x1="1086" y1="830" x2="1430" y2="830" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="1086" y1="850" x2="1112" y2="850" stroke="#f5a623" stroke-width="1.75" marker-end="url(#ah)"/>
    <text x="1124" y="855" fill="#b3a99b" font-size="14">amber · happy path</text>
    <rect x="1088" y="868" width="16" height="16" rx="2" fill="#100e0c" stroke="#5fd17e" stroke-width="1.5"/>
    <text x="1124" y="881" fill="#b3a99b" font-size="14">green · delivered (terminal)</text>
    <line x1="1086" y1="902" x2="1112" y2="902" stroke="#8d8475" stroke-width="1.4" marker-end="url(#ahh)"/>
    <text x="1124" y="907" fill="#b3a99b" font-size="14">grey · branch transition</text>
    <text x="1086" y="926" fill="#8d8475" font-size="12">01–07 spine · 08–11 exception / inventory</text>

  </g>
</svg>
