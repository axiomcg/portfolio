<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000" role="img">
  <title>HyperEVM bot — concentrated-liquidity re-centering (money shot)</title>
  <desc>An engineering schematic. A price axis shows the current tick. An ultra-narrow liquidity window, one tick-spacing step wide, is re-centered onto the live tick when price reaches eighty percent of the window edge — the old window goes out of range and a new window is minted on the live tick, so the window chases the price. The re-center loop runs every five seconds: read slot0, decreaseLiquidity, collect, burn, mint window.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="0.8" cy="0.8" r="0.8" fill="#f5e6d2" fill-opacity="0.045"/>
    </pattern>
    <pattern id="lh" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#f5a623" stroke-opacity="0.30" stroke-width="1"/>
    </pattern>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f5a623"/>
    </marker>
    <marker id="ahh" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8d8475"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1000" fill="#0b0a09"/>
  <rect x="0" y="0" width="1500" height="1000" fill="url(#grid)"/>
  <rect x="48" y="48" width="1404" height="904" fill="none" stroke="#f5e6d2" stroke-opacity="0.10" stroke-width="1"/>
  <path d="M48 66 L48 48 L66 48" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M1452 66 L1452 48 L1434 48" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M48 934 L48 952 L66 952" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M1452 934 L1452 952 L1434 952" fill="none" stroke="#f5a623" stroke-opacity="0.55" stroke-width="1.5"/>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,ui-monospace,monospace">
    <!-- kicker -->
    <text x="72" y="92" font-size="22" fill="#f5a623">// hyperevm · concentrated-liquidity re-centering</text>

    <!-- focal callout -->
    <text x="752" y="208" text-anchor="middle" font-size="30" fill="#f5a623">window chases the price</text>

    <!-- ===================== BAND A · price axis + window chase ===================== -->
    <!-- price axis -->
    <g stroke="#f5e6d2" stroke-opacity="0.10" stroke-width="1">
      <line x1="168" y1="378" x2="168" y2="390"/>
      <line x1="256" y1="378" x2="256" y2="390"/>
      <line x1="344" y1="378" x2="344" y2="390"/>
      <line x1="432" y1="378" x2="432" y2="390"/>
      <line x1="520" y1="378" x2="520" y2="390"/>
      <line x1="608" y1="378" x2="608" y2="390"/>
      <line x1="696" y1="378" x2="696" y2="390"/>
      <line x1="784" y1="378" x2="784" y2="390"/>
      <line x1="872" y1="378" x2="872" y2="390"/>
      <line x1="1048" y1="378" x2="1048" y2="390"/>
      <line x1="1136" y1="378" x2="1136" y2="390"/>
      <line x1="1224" y1="378" x2="1224" y2="390"/>
      <line x1="1312" y1="378" x2="1312" y2="390"/>
    </g>
    <line x1="130" y1="384" x2="1372" y2="384" stroke="#f5e6d2" stroke-opacity="0.28" stroke-width="1.5" marker-end="url(#ahh)"/>
    <text x="1360" y="366" text-anchor="end" font-size="15" fill="#8d8475">price · tick →</text>

    <!-- old window (out of range) -->
    <rect x="336" y="328" width="96" height="112" rx="3" fill="#f5e6d2" fill-opacity="0.04" stroke="#f5e6d2" stroke-opacity="0.24" stroke-width="1.5" stroke-dasharray="4 4"/>

    <!-- live window (centered on current tick) -->
    <rect x="896" y="328" width="96" height="112" rx="3" fill="#f5a623" fill-opacity="0.07"/>
    <rect x="896" y="328" width="96" height="112" rx="3" fill="url(#lh)"/>
    <rect x="896" y="328" width="96" height="112" rx="3" fill="none" stroke="#f5a623" stroke-width="1.75"/>

    <!-- current tick line -->
    <line x1="944" y1="296" x2="944" y2="480" stroke="#f5a623" stroke-width="2"/>
    <text x="958" y="318" font-size="15" fill="#f5a623">current tick</text>

    <!-- chase arrow (orthogonal amber hero) -->
    <polyline points="384,328 384,296 944,296 944,328" fill="none" stroke="#f5a623" stroke-width="2.25" marker-end="url(#ah)"/>
    <g>
      <rect x="556" y="283" width="216" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="664" y="301" text-anchor="middle" font-size="15" fill="#b3a99b">re-center → live tick</text>
    </g>

    <!-- old window chips -->
    <g>
      <rect x="259" y="457" width="250" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="384" y="475" text-anchor="middle" font-size="15" fill="#b3a99b">old window · out of range</text>
    </g>
    <g>
      <rect x="286" y="488" width="196" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="384" y="506" text-anchor="middle" font-size="15" fill="#8d8475">price ≥ 80% to edge</text>
    </g>

    <!-- live window chip -->
    <line x1="992" y1="384" x2="1044" y2="384" stroke="#f5e6d2" stroke-opacity="0.22" stroke-width="1.5"/>
    <g>
      <rect x="1052" y="371" width="300" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="1202" y="389" text-anchor="middle" font-size="15" fill="#b3a99b">live window · W = 1 tickSpacing</text>
    </g>

    <!-- ===================== BAND B · re-center loop ===================== -->
    <rect x="72" y="556" width="1308" height="210" rx="6" fill="none" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1.2" stroke-dasharray="2 6"/>
    <text x="88" y="582" font-size="16" fill="#8d8475">// re-center loop · runs every 5s</text>

    <!-- connectors (amber, orthogonal) -->
    <g fill="none" stroke="#f5a623" stroke-width="1.75">
      <polyline points="480,636 540,636" marker-end="url(#ah)"/>
      <polyline points="868,636 928,636" marker-end="url(#ah)"/>
      <polyline points="1092,672 1092,686" marker-end="url(#ah)"/>
      <polyline points="928,722 868,722" marker-end="url(#ah)"/>
      <polyline points="540,722 116,722 116,636 152,636" marker-end="url(#ah)"/>
    </g>
    <g>
      <rect x="245" y="709" width="116" height="26" rx="3" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.12"/>
      <text x="303" y="727" text-anchor="middle" font-size="15" fill="#b3a99b">↻ every 5s</text>
    </g>

    <!-- loop nodes -->
    <g>
      <rect x="152" y="600" width="328" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="152" y="600" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="176" y="644" font-size="22" fill="#ece7df"><tspan fill="#f5a623">01</tspan>  read slot0 tick</text>
    </g>
    <g>
      <rect x="540" y="600" width="328" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="540" y="600" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="564" y="644" font-size="22" fill="#ece7df"><tspan fill="#f5a623">02</tspan>  decreaseLiquidity</text>
    </g>
    <g>
      <rect x="928" y="600" width="328" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="928" y="600" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="952" y="644" font-size="22" fill="#ece7df"><tspan fill="#f5a623">03</tspan>  collect</text>
    </g>
    <g>
      <rect x="928" y="686" width="328" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="928" y="686" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="952" y="730" font-size="22" fill="#ece7df"><tspan fill="#f5a623">04</tspan>  burn</text>
    </g>
    <g>
      <rect x="540" y="686" width="328" height="72" rx="4" fill="#100e0c" stroke="#f5e6d2" stroke-opacity="0.20" stroke-width="1.5"/>
      <rect x="540" y="686" width="3" height="72" rx="1.5" fill="#f5a623"/>
      <text x="564" y="730" font-size="22" fill="#ece7df"><tspan fill="#f5a623">05</tspan>  mint window</text>
    </g>

    <!-- ===================== title cartouche ===================== -->
    <rect x="1064" y="792" width="384" height="152" rx="6" fill="#0b0a09" stroke="#f5e6d2" stroke-opacity="0.18" stroke-width="1.2"/>
    <text x="1086" y="822" font-size="14" fill="#8d8475" letter-spacing="2">GLEB PYATKOV</text>
    <text x="1086" y="850" font-size="18" fill="#f5a623">hyperevm <tspan fill="#8d8475">· fig.01</tspan></text>
    <line x1="1086" y1="864" x2="1426" y2="864" stroke="#f5e6d2" stroke-opacity="0.16" stroke-width="1"/>
    <!-- legend -->
    <line x1="1086" y1="888" x2="1118" y2="888" stroke="#f5a623" stroke-width="2" marker-end="url(#ah)"/>
    <text x="1132" y="893" font-size="14" fill="#b3a99b">amber · re-center path</text>
    <circle cx="1095" cy="912" r="9" fill="none" stroke="#f5a623" stroke-width="1.3"/>
    <text x="1095" y="917" text-anchor="middle" font-size="11" fill="#f5a623">0N</text>
    <text x="1132" y="917" font-size="14" fill="#b3a99b">numbered loop step</text>
    <rect x="1086" y="928" width="20" height="16" rx="2" fill="url(#lh)" stroke="#f5a623" stroke-width="1.2"/>
    <text x="1132" y="941" font-size="14" fill="#b3a99b">liquidity window</text>
  </g>
</svg>
